<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 330" width="860" height="330" font-family="'JetBrains Mono','Fira Code','Cascadia Code',ui-monospace,'SFMono-Regular',Menlo,Consolas,'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif">
  <!-- window -->
  <rect x="0.5" y="0.5" width="859" height="329" rx="12" fill="#0d1117" stroke="#30363d"/>
  <!-- title bar -->
  <rect x="1" y="1" width="858" height="40" rx="11" fill="#161b22"/>
  <rect x="1" y="22" width="858" height="19" fill="#161b22"/>
  <line x1="1" y1="41" x2="859" y2="41" stroke="#30363d"/>
  <circle cx="26" cy="21" r="6" fill="#ff5f56"/>
  <circle cx="48" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="21" r="6" fill="#27c93f"/>
  <text x="430" y="26" fill="#8b949e" font-size="13" text-anchor="middle">programApe@github: ~/dev — langstat</text>

  <!-- heading -->
  <text x="26" y="78" font-size="15"><tspan fill="#27c93f">$</tspan><tspan fill="#c9d1d9" dx="9">langstat --top</tspan><tspan fill="#6e7681" dx="14" font-size="13"># 主力技术栈占比（自评）</tspan></text>

  <!-- bars -->
  <g font-size="14.5">
    <!-- Rust -->
    <text x="26" y="117" fill="#abb2bf">Rust</text>
    <rect x="170" y="105" width="560" height="14" rx="7" fill="#21262d"/>
    <rect x="170" y="105" width="482" height="14" rx="7" fill="#dea584"/>
    <text x="744" y="117" fill="#8b949e" font-size="12.5">86%</text>
    <!-- TypeScript -->
    <text x="26" y="150" fill="#abb2bf">TypeScript</text>
    <rect x="170" y="138" width="560" height="14" rx="7" fill="#21262d"/>
    <rect x="170" y="138" width="448" height="14" rx="7" fill="#3178c6"/>
    <text x="744" y="150" fill="#8b949e" font-size="12.5">80%</text>
    <!-- Swift -->
    <text x="26" y="183" fill="#abb2bf">Swift</text>
    <rect x="170" y="171" width="560" height="14" rx="7" fill="#21262d"/>
    <rect x="170" y="171" width="392" height="14" rx="7" fill="#f05138"/>
    <text x="744" y="183" fill="#8b949e" font-size="12.5">70%</text>
    <!-- Dart -->
    <text x="26" y="216" fill="#abb2bf">Dart</text>
    <rect x="170" y="204" width="560" height="14" rx="7" fill="#21262d"/>
    <rect x="170" y="204" width="358" height="14" rx="7" fill="#2bb5ab"/>
    <text x="744" y="216" fill="#8b949e" font-size="12.5">64%</text>
    <!-- Java -->
    <text x="26" y="249" fill="#abb2bf">Java</text>
    <rect x="170" y="237" width="560" height="14" rx="7" fill="#21262d"/>
    <rect x="170" y="237" width="325" height="14" rx="7" fill="#f0972a"/>
    <text x="744" y="249" fill="#8b949e" font-size="12.5">58%</text>
    <!-- Python / C -->
    <text x="26" y="282" fill="#abb2bf">Python · C</text>
    <rect x="170" y="270" width="560" height="14" rx="7" fill="#21262d"/>
    <rect x="170" y="270" width="258" height="14" rx="7" fill="#4b8bbe"/>
    <text x="744" y="282" fill="#8b949e" font-size="12.5">46%</text>
  </g>

  <!-- cursor -->
  <text x="26" y="312" font-size="15"><tspan fill="#27c93f">$</tspan></text>
  <rect x="44" y="301" width="9" height="15" fill="#27c93f">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
