name: Generate Snake

# 把贡献图渲染成贪吃蛇动画，生成的 SVG 推到 output 分支，README 引用
# 读取的是公开贡献日历，无需 PAT，自带 GITHUB_TOKEN 即可
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake svg (purple theme)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#7c3aed&color_dots=#ebedf0,#d8c5f5,#b794f4,#9061f9,#7c3aed
            dist/github-contribution-grid-snake-dark.svg?color_snake=#a371f7&color_dots=#161b22,#3a1c71,#6e40c9,#8b5cf6,#c4b5fd

      - name: Push snake svg to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
