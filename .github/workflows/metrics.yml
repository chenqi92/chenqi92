name: GitHub Metrics

# 每 6 小时刷新一次，生成的 SVG 直接 commit 进本仓库 metrics/ 目录
# README 引用本地 SVG，不依赖任何第三方公共缓存（解决 ossinsight 滞后问题）
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:        # 允许在 Actions 页面手动触发（第一次跑用这个）
  push:
    branches: [main]
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # 1) 主看板：基础信息 + 活跃度 + 社区 + 仓库 + 等距提交日历（替代 ossinsight 那张图）
      - name: Overview dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: chenqi92
          filename: metrics/overview.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: commit
          committer_message: "chore(metrics): update overview.svg"
          extras_css: |
            svg { color: #8b949e; }
            h2 { color: #a371f7 !important; }

      # 2) Top 语言
      - name: Top languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: chenqi92
          filename: metrics/languages.svg
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          output_action: commit
          committer_message: "chore(metrics): update languages.svg"
          extras_css: |
            svg { color: #8b949e; }
            h2 { color: #a371f7 !important; }

      # 3) 编码习惯：最活跃时段 / 星期 / 常用语言
      - name: Coding habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: chenqi92
          filename: metrics/habits.svg
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          output_action: commit
          committer_message: "chore(metrics): update habits.svg"
          extras_css: |
            svg { color: #8b949e; }
            h2 { color: #a371f7 !important; }
