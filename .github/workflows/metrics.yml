name: GitHub Metrics

# 终端风格的统计卡片，生成的 SVG commit 进本仓库 metrics/ 目录
# README 引用本地 SVG，不依赖第三方公共缓存（解决 ossinsight 滞后问题）
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:        # 首次在 Actions 页面手动触发
  push:
    branches: [main]
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Terminal stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: chenqi92
          filename: metrics/terminal.svg
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          plugin_languages: yes
          plugin_languages_limit: 8
          output_action: commit
          committer_message: "chore(metrics): update terminal.svg"
