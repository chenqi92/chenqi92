name: Stats Card

# 定时用 GitHub 公开数据重新生成 metrics/terminal.svg 并提交
# 仅读公开信息，使用默认 GITHUB_TOKEN，无需 PAT
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/gen-stats-svg.sh"
      - ".github/workflows/stats.yml"

permissions:
  contents: write

concurrency:
  group: stats-card
  cancel-in-progress: false

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/gen-stats-svg.sh chenqi92

      - name: Commit if changed
        run: |
          if git diff --quiet -- metrics/terminal.svg; then
            echo "no change"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/terminal.svg
          git commit -m "chore(stats): refresh terminal.svg"
          git push
